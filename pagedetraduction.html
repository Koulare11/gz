<script>
    document.getElementById('language-selector').addEventListener('change', function() {
        const selectedLanguage = this.value;
        localStorage.setItem('selectedLanguage', selectedLanguage);
        translatePage(selectedLanguage);
    });

    window.onload = function() {
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
        translatePage(savedLanguage);
        document.getElementById('language-selector').value = savedLanguage;
    };

    function translatePage(targetLanguage) {
        const elementsToTranslate = document.querySelectorAll('.page-text, .page-title');
        const textsToTranslate = Array.from(elementsToTranslate).map(el => el.innerText);

        fetch(`https://translation.googleapis.com/language/translate/v2?key=AIzaSyAhSuyg-seUr2j5NEQzYHogYqaTyPciVH0`, {
            method: 'POST',
            body: JSON.stringify({
                q: textsToTranslate,
                target: targetLanguage
            }),
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            const translations = data.data.translations;
            translations.forEach((translation, index) => {
                elementsToTranslate[index].innerText = translation.translatedText;
            });
        })
        .catch(error => console.error('Error:', error));
    }
</script>
