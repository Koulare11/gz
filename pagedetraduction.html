<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Billabong&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5; 
            margin: 0;
            padding: 0;
            color: #333; 
            font-family: 'Roboto', Arial, sans-serif; 
        }
        header {
            background-color: #ffffff; 
            padding: 5px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h1 {
            margin: 0;
            font-size: 1.2em; 
            font-family: 'Billabong', cursive;
            color: #007BFF; 
        }
        .logo-genz {
            border: 1.5px solid #007BFF; 
            padding: 3px 6px; 
            display: inline-block;
            border-radius: 5px;
            white-space: nowrap;
        }
        .divider {
            height: 1px;
            background-color: #007BFF; 
            width: 100%;
            margin-top: 0; 
        }
        .divider-text {
            text-align: center;
            color: #333; 
            font-size: 0.9em;
            margin: 10px 0; 
        }
        footer {
            text-align: center;
            color: #333; 
            margin: 20px 0;
            font-size: 0.8em;
        }
        #language-selector {
            margin-left: auto; 
            padding: 3px; 
            border: 1px solid #007BFF;
            border-radius: 5px;
            font-size: 0.9em;
            color: #333;
            background-color: #ffffff; 
            width: 100px; 
        }
        .info-text {
            text-align: center; 
            margin: 20px 0; 
            font-size: 1em; 
            color: #333; 
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="text-decoration: none; color: inherit;">
        <h1 class="logo-genz" translate="no">GZ</h1>
    </a>
    <select id="language-selector">
        <option value="" disabled selected>Language</option>
        <option value="fr">French</option>
        <option value="en">English</option>
        <!-- Ajoute d'autres options de langue ici -->
    </select>
</header>

<div class="divider"></div>
<div class="divider-text">Translation page</div>
<div class="divider"></div>

<div class="info-text">
    Si la traduction dans votre langue préférée a réussi, vous pouvez revenir à la page principale en cliquant sur 'G-Z'.
</div>

<footer>
    <p></p>
</footer>

<script>
    document.getElementById('language-selector').addEventListener('change', function() {
        const selectedLanguage = this.value;
        localStorage.setItem('selectedLanguage', selectedLanguage);
        translatePage(selectedLanguage);
    });

    window.onload = function() {
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
        translatePage(savedLanguage);
        document.getElementById('language-selector').value = savedLanguage;
    };

    function translatePage(targetLanguage) {
        const elementsToTranslate = document.querySelectorAll('.page-text, .page-title');
        const textsToTranslate = Array.from(elementsToTranslate).map(el => el.innerText);

        fetch(`https://translation.googleapis.com/language/translate/v2?key=AIzaSyAhSuyg-seUr2j5NEQzYHogYqaTyPciVH0`, {
            method: 'POST',
            body: JSON.stringify({
                q: textsToTranslate,
                target: targetLanguage
            }),
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            const translations = data.data.translations;
            translations.forEach((translation, index) => {
                if (elementsToTranslate[index]) {
                    elementsToTranslate[index].innerText = translation.translatedText;
                }
            });
        })
        .catch(error => console.error('Error:', error));
    }
</script>

</body>
</html>
