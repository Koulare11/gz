<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Billabong&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5; /* Light background color */
            margin: 0;
            padding: 0;
            color: #333; /* Text color */
            font-family: 'Roboto', Arial, sans-serif; /* Use a similar font */
        }
        header {
            background-color: #ffffff; /* White background */
            padding: 5px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Light shadow */
        }
        h1 {
            margin: 0;
            font-size: 1.2em; /* Adjusted font size */
            font-family: 'Billabong', cursive;
            color: #007BFF; /* Blue color */
        }
        .logo-genz {
            border: 1.5px solid #007BFF; /* Blue border */
            padding: 3px 6px; /* Reduced padding */
            display: inline-block;
            border-radius: 5px;
            white-space: nowrap;
        }
        .faq-button {
            color: #007BFF; /* Blue color */
            font-size: 0.9em; /* Reduced font size */
            padding: 3px 6px; /* Reduced padding */
            border: 1px solid #007BFF; /* Blue border */
            border-radius: 5px;
            margin-left: 5px;
            cursor: pointer;
            background-color: transparent; /* Transparent background */
            display: flex;
            align-items: center; 
        }
        .divider {
            height: 1px;
            background-color: #007BFF; /* Blue border */
            width: 100%;
            margin-top: 0; /* Remove top margin */
        }
        .divider-text {
            text-align: center;
            color: #333; /* Text color */
            font-size: 0.9em;
            margin: 10px 0; 
        }
        .faq-content {
            padding: 10px 20px; /* Reduced top padding */
            font-size: 0.85em;
        }
        .faq-content h2 {
            font-size: 1.2em; /* Reduced size for FAQ headings */
        }
        footer {
            text-align: center;
            color: #333; /* Text color */
            margin: 20px 0;
            font-size: 0.8em;
        }
        #google_translate_element {
            margin: 10px; /* Adjust margin for visibility */
        }
        /* Hide the default Google Translate toolbar */
        .skiptranslate > iframe.skiptranslate {
            display: none !important;
        }
        body {
            top: 0px !important; /* Ensure page layout is correct */
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="text-decoration: none; color: inherit;">
        <h1 class="logo-genz" translate="no">GZ</h1>
    </a>
    <div style="display: flex; align-items: center;">
        <div class="faq-button">Translator</div>
    </div>
</header>

<div id="google_translate_element"></div> <!-- Google Translate Widget -->

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en', // Change this to your default language
            includedLanguages: 'af,sq,ar,hy,az,eu,bn,bs,ca,hr,cs,da,nl,en,eo,et,tl,fi,fr,gl,ka,de,el,gu,ht,ha,haw,he,hi,hu,is,id,ga,it,ja,jw,kn,kk,km,ko,ku,ky,la,lv,lt,lb,mk,ml,mn,mi,mar,my,no,ny,or,ps,fa,pl,pt,pa,ro,ru,sr,si,sk,sl,so,es,su,sw,sv,ta,te,th,tl,tr,uk,ur,vi,cy,xh,yi,zu', // List of languages sorted alphabetically
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false // Prevent auto display of the toolbar
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
